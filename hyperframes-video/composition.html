<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    /* ── 全局 ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }

    /* ── 场景容器 ── */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      opacity: 0;
    }
    .scene.visible { opacity: 1; }

    /* ── 背景层 ── */
    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(99,102,241,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 30% 70%, rgba(168,85,247,0.10) 0%, transparent 60%),
        linear-gradient(180deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
    }

    /* ── 入场动画 ── */
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(30px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes scaleIn {
      0%   { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes countUp {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    .anim-fade-up   { animation: fadeUp 0.6s ease-out both; }
    .anim-fade-in   { animation: fadeIn 0.5s ease-out both; }
    .anim-scale-in  { animation: scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    .anim-count-up  { animation: countUp 0.4s ease-out both; }

    /* ── 文字样式 ── */
    .title {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }

    .title-main {
      font-size: 78px;
      color: #ffffff;
      text-shadow: 0 2px 40px rgba(99,102,241,0.3);
    }

    .title-sub {
      font-size: 56px;
      color: rgba(255,255,255,0.85);
    }

    .title-accent {
      font-size: 72px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .number-big {
      font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif;
      font-size: 140px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #a855f7, #6366f1);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .number-sub {
      font-size: 44px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-top: 8px;
    }

    .brand {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.15em;
      z-index: 1;
    }

    /* ── 装饰粒子 ── */
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      z-index: 0;
    }
  </style>
</head>
<body>
